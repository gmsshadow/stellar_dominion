# Stellar Dominion - Sample Orders (Bob)
#
# A crew management turn: promote an officer, rename things,
# ask the GM for a ship upgrade, and start heading out.
#
# Submit with:
#   python pbem.py submit-orders samples/bob_orders.yaml --email bob@example.com
#
# IMPORTANT: Replace ACCOUNT_NUMBER and SHIP_ID below with your actual values.
# Find them with:  python pbem.py list-ships

game: OMICRON101
account: ACCOUNT_NUMBER
ship: SHIP_ID
orders:
  - MAKEOFFICER: "SHIP_ID 401 Helena Voss"       # 10 OC - promote crew to officer
  - RENAMESHIP: "SHIP_ID The Wanderer"            # 0 OC - rename ship
  - MODERATOR: Can I swap a Cargo Bay for a Deep Space Scanner?  # 0 OC - GM request
  - SCANSYSTEM                                    # 20 OC - full system map
  - MOVE: T20                                     # 2 OC/square - head to Meridian
  - ORBIT: 412003                                 # 10 OC - orbit Meridian
  - DOCK: 78901234                                # 30 OC - dock at Waystation
